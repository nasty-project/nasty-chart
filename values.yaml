# Default values for nasty-csi-driver.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# NASty connection settings
nasty:
  # NASty API URL (WebSocket endpoint)
  # Format: wss://YOUR-NASTY-IP:PORT/api/current
  # Example: wss://nasty.example.com:443/api/current
  url: ""

  # NASty API key
  # Generate in NASty settings
  apiKey: ""

  # Name of existing secret containing NASty credentials
  # If set, url and apiKey above will be ignored
  # Secret should contain keys: 'url' and 'api-key'
  existingSecret: ""

  # Skip TLS certificate verification
  # Set to true if NASty uses self-signed certificates
  # WARNING: Only enable this in trusted networks
  skipTLSVerify: false

# Image configuration
image:
  repository: bfenski/nasty-csi
  pullPolicy: IfNotPresent
  # Image tag to use. If empty, defaults to the chart's appVersion.
  # For production, either:
  #   1. Use a specific chart version: helm install --version 0.8.0
  #   2. Pin the image tag explicitly: --set image.tag=v0.8.0
  # The "latest" tag is available but NOT recommended for production use.
  tag: ""

imagePullSecrets: []

# Unique identifier for this cluster (for multi-cluster NASty sharing).
# When multiple K8s clusters share a NASty box, set this to a unique value
# per cluster so the dashboard only shows volumes belonging to this cluster.
# Leave empty to see all volumes (backward compatible).
clusterID: ""

# CSI Driver name
csiDriverName: nasty.csi.io

# Controller configuration
controller:
  # Number of controller replicas (should be 1 for leader election)
  replicas: 1

  # Log verbosity level (0-5, higher = more verbose)
  # 0: Errors only
  # 2: Normal operation (default) - volume created/deleted messages
  # 4: Detailed operations - API calls, dataset queries
  # 5: Debug - request/response bodies, context dumps
  logLevel: 2

  # Enable debug mode (sets DEBUG_CSI=true, equivalent to logLevel 4+)
  debug: false

  # Metrics configuration
  metrics:
    # Enable Prometheus metrics endpoint
    enabled: true
    # Port to expose metrics on
    port: 8080
    # Create a Service for metrics
    service:
      enabled: true
      type: ClusterIP
      port: 8080
      # Optional clusterIP to use (leave empty for automatic assignment)
      clusterIP: ""
      # Additional annotations for the Service
      annotations: {}
      # Additional labels for the Service
      labels: {}
    # Create a ServiceMonitor for Prometheus Operator
    serviceMonitor:
      enabled: false
      # Namespace to create the ServiceMonitor in (defaults to release namespace)
      namespace: ""
      # Additional labels for ServiceMonitor (e.g., release: prometheus)
      labels: {}
      # Additional annotations for ServiceMonitor
      annotations: {}
      # Scrape interval
      interval: 30s
      # Scrape timeout
      scrapeTimeout: 10s
      # Relabelings to apply to samples before ingestion
      relabelings: []
      # MetricRelabelings to apply to samples before ingestion
      metricRelabelings: []

  # In-cluster web dashboard
  dashboard:
    # Enable the in-cluster web dashboard
    enabled: false
    # Port to expose dashboard on
    port: 2137
    # Filesystem to scan for unmanaged volume discovery (optional)
    filesystem: ""
    # Create a Service for the dashboard
    service:
      enabled: true
      type: ClusterIP
      port: 2137
      annotations: {}
    # Ingress for external access to dashboard
    ingress:
      enabled: false
      className: ""
      annotations: {}
      hosts: []
      # - host: nasty-csi.example.com
      #   paths:
      #     - path: /dashboard
      #       pathType: Prefix
      tls: []
      # - secretName: nasty-csi-tls
      #   hosts:
      #     - nasty-csi.example.com

  # Resource requests and limits
  resources:
    requests:
      cpu: 10m
      memory: 20Mi
    limits:
      cpu: 200m
      memory: 200Mi

  # Node selector for controller pod
  nodeSelector: {}

  # Tolerations for controller pod
  tolerations: []

  # Affinity for controller pod
  affinity: {}

# Node plugin configuration
node:
  # Kubelet data directory path
  # Different Kubernetes distributions use different paths:
  # - Standard K8s, K3s, Minikube: /var/lib/kubelet
  # - K0s: /var/lib/k0s/kubelet
  # - OpenShift: /var/lib/kubelet
  kubeletPath: /var/lib/kubelet

  # Log verbosity level (0-5, higher = more verbose)
  # 0: Errors only
  # 2: Normal operation (default) - volume created/deleted messages
  # 4: Detailed operations - API calls, staging details
  # 5: Debug - request/response bodies, context dumps
  logLevel: 2

  # Enable debug mode (sets DEBUG_CSI=true, equivalent to logLevel 4+)
  debug: false

  # Resource requests and limits for node plugin
  resources:
    requests:
      cpu: 10m
      memory: 20Mi
    limits:
      cpu: 200m
      memory: 200Mi

  # Node selector for node pods
  nodeSelector: {}

  # Tolerations for node pods
  tolerations: []

  # Affinity for node pods
  affinity: {}

  # NVMe-oF optimization settings
  # Skip redundant nvme discover before nvme connect.
  # All connection params (NQN, server, port, transport) are already known from volume context.
  # Enable only if you need discovery for multi-path or dynamic target topologies.
  enableNVMeDiscovery: false

  # Maximum concurrent NVMe-oF connect operations per node.
  # Limits contention on the kernel's NVMe subsystem registration lock.
  # Recommended: 3-5. Set to 0 for unlimited (not recommended with >10 volumes per node).
  maxConcurrentNVMeConnects: 5

  # Update strategy for DaemonSet
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1

# CSI sidecar images
sidecars:
  provisioner:
    image:
      repository: registry.k8s.io/sig-storage/csi-provisioner
      tag: v6.1.0
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 10m
        memory: 40Mi
      limits:
        cpu: 300m
        memory: 300Mi

  attacher:
    image:
      repository: registry.k8s.io/sig-storage/csi-attacher
      tag: v4.10.0
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 10m
        memory: 40Mi
      limits:
        cpu: 300m
        memory: 300Mi

  resizer:
    image:
      repository: registry.k8s.io/sig-storage/csi-resizer
      tag: v2.0.0
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 10m
        memory: 40Mi
      limits:
        cpu: 300m
        memory: 300Mi

  nodeDriverRegistrar:
    image:
      repository: registry.k8s.io/sig-storage/csi-node-driver-registrar
      tag: v2.15.0
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 10m
        memory: 20Mi
      limits:
        cpu: 100m
        memory: 100Mi

  snapshotter:
    image:
      repository: registry.k8s.io/sig-storage/csi-snapshotter
      tag: v8.4.0
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 10m
        memory: 20Mi
      limits:
        cpu: 200m
        memory: 200Mi

  livenessprobe:
    image:
      repository: registry.k8s.io/sig-storage/livenessprobe
      tag: v2.14.0
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 10m
        memory: 20Mi
      limits:
        cpu: 100m
        memory: 100Mi

# Storage class configuration
# Each entry creates a Kubernetes StorageClass. You can have multiple classes
# per protocol (e.g., two NFS classes with different reclaim policies).
# Required fields per entry: name, protocol (nfs/nvmeof/iscsi/smb), filesystem, server
storageClasses:
  # NFS storage class
  - name: nasty-csi-nfs
    enabled: true
    protocol: nfs
    # Set as default storage class
    isDefault: false
    # Filesystem name on NASty
    filesystem: "storage"
    # NASty server IP/hostname for NFS mounts
    server: ""
    # Reclaim policy: Delete or Retain
    reclaimPolicy: Delete
    # Volume binding mode: Immediate or WaitForFirstConsumer
    volumeBindingMode: Immediate
    # Allow volume expansion
    allowVolumeExpansion: true
    # Mount options for NFS volumes
    # These are merged with driver defaults (vers=4.2, nolock on Linux)
    # User-specified options override defaults if there's a conflict
    # Example: ["hard", "nointr", "rsize=1048576", "wsize=1048576"]
    mountOptions: []
    # Delete strategy: "delete" or "retain"
    #   - "delete" (default): Volume is deleted when PVC is deleted
    #   - "retain": Volume is kept on NASty when PVC is deleted (useful for data protection)
    deleteStrategy: ""
    # Compression algorithm for new subvolumes (e.g., "lz4", "zstd", "none")
    # If empty, inherits the filesystem default.
    compression: ""
    # Volume Name Templating:
    #   Go template for volume names (e.g., "{{ .PVCNamespace }}-{{ .PVCName }}")
    #   Available variables: .PVCName, .PVCNamespace, .PVName
    #   Example: "{{ .PVCNamespace }}-{{ .PVCName }}" creates "production-myapp-data"
    nameTemplate: ""
    #   Simple prefix to prepend to volume name (e.g., "prod-")
    namePrefix: ""
    #   Simple suffix to append to volume name (e.g., "-data")
    #   Note: nameTemplate takes precedence over namePrefix/nameSuffix if both are specified
    nameSuffix: ""
    # Dataset Comment Templating:
    #   Go template for dataset comments visible in NASty
    #   Uses the same variables as nameTemplate: .PVCName, .PVCNamespace, .PVName
    #   Example: "{{ .PVCNamespace }}/{{ .PVCName }}" shows "production/myapp-data" in NASty
    commentTemplate: ""
    # Volume Adoption (for cluster migration):
    #   When "true", newly created volumes are marked as adoptable
    #   Adoptable volumes can be imported into a different cluster using 'kubectl nasty adopt'
    markAdoptable: ""
    #   When "true", the driver will adopt existing volumes that match the PVC name
    #   Useful for migrating volumes between clusters or recovering from cluster failures
    adoptExisting: ""
    # Encryption (bcachefs native encryption):
    #   Set to "true" to enable encryption for the subvolume
    encryption: ""
    # NFS client access rules (optional)
    #   Format: "host1:options,host2:options" or "*:rw,no_root_squash"
    #   If empty, NASty defaults apply.
    # nfsClients: "*:rw,no_root_squash"
    # Additional protocol-specific parameters
    parameters: {}

  # NVMe-oF storage class (requires Linux with nvme-tcp kernel module)
  # IMPORTANT: Before enabling, ensure you have configured an NVMe-oF port
  # in NASty. The CSI driver automatically creates a dedicated subsystem
  # for each volume — no pre-configured subsystem needed.
  - name: nasty-csi-nvmeof
    enabled: false
    protocol: nvmeof
    isDefault: false
    filesystem: "storage"
    server: ""
    # NVMe-oF transport: tcp or rdma
    transport: "tcp"
    # NVMe-oF port number
    port: "4420"
    # Filesystem type for formatted volumes (ext4, ext3, xfs)
    fsType: "ext4"
    reclaimPolicy: Delete
    # NOTE: Must use Immediate for snapshot restore to work correctly.
    # WaitForFirstConsumer causes csi-provisioner to not pass VolumeContentSource
    # (snapshot reference) to CreateVolume, resulting in empty volumes instead of clones.
    volumeBindingMode: Immediate
    allowVolumeExpansion: true
    # Mount options for NVMe-oF filesystem volumes
    # These are merged with driver defaults (noatime)
    mountOptions: []
    deleteStrategy: ""
    compression: ""
    nameTemplate: ""
    namePrefix: ""
    nameSuffix: ""
    commentTemplate: ""
    markAdoptable: ""
    adoptExisting: ""
    encryption: ""
    # Additional parameters:
    #   portID: NASty NVMe-oF port ID (auto-detected if not specified)
    #   nvmeof.nr-io-queues: Number of I/O queues
    #   nvmeof.queue-size: Queue size
    parameters: {}

  # iSCSI storage class (requires open-iscsi on nodes)
  # IMPORTANT: Before enabling, ensure you have configured an iSCSI portal
  # in NASty. The CSI driver automatically creates a dedicated target
  # for each volume — no pre-configured target needed.
  - name: nasty-csi-iscsi
    enabled: false
    protocol: iscsi
    isDefault: false
    filesystem: "storage"
    server: ""
    # iSCSI port number
    port: "3260"
    # Filesystem type for formatted volumes (ext4, ext3, xfs)
    fsType: "ext4"
    reclaimPolicy: Delete
    # NOTE: Must use Immediate for snapshot restore to work correctly.
    volumeBindingMode: Immediate
    allowVolumeExpansion: true
    # Mount options for iSCSI filesystem volumes
    # These are merged with driver defaults (noatime, _netdev)
    mountOptions: []
    deleteStrategy: ""
    compression: ""
    nameTemplate: ""
    namePrefix: ""
    nameSuffix: ""
    commentTemplate: ""
    markAdoptable: ""
    adoptExisting: ""
    encryption: ""
    parameters: {}

  # SMB/CIFS storage class (requires cifs-utils on nodes)
  # IMPORTANT: SMB requires authentication. Create a Kubernetes Secret with keys:
  #   username, password, and optionally domain, then reference it below.
  - name: nasty-csi-smb
    enabled: false
    protocol: smb
    isDefault: false
    filesystem: "storage"
    server: ""
    reclaimPolicy: Delete
    volumeBindingMode: Immediate
    allowVolumeExpansion: true
    # Mount options for SMB volumes
    # These are merged with driver defaults (vers=3.0 on Linux)
    mountOptions: []
    deleteStrategy: ""
    compression: ""
    nameTemplate: ""
    namePrefix: ""
    nameSuffix: ""
    commentTemplate: ""
    markAdoptable: ""
    adoptExisting: ""
    encryption: ""
    # SMB Credentials Secret:
    #   Kubernetes Secret containing SMB authentication credentials.
    #   The secret should have keys: username, password, domain (optional).
    smbCredentialsSecret:
      name: ""
      namespace: ""
    # SMB username for share ownership — the share directory will be
    # chowned to this user so authenticated writes succeed.
    smbUsername: ""
    parameters: {}

  # To add more storage classes, simply add more entries to this list:
  # - name: nasty-csi-nfs-retain
  #   enabled: true
  #   protocol: nfs
  #   filesystem: "storage"
  #   server: "10.0.0.1"
  #   reclaimPolicy: Retain
  #   deleteStrategy: retain

# Snapshot support
snapshots:
  # Enable snapshot support (adds csi-snapshotter sidecar to controller)
  # NOTE: Requires VolumeSnapshot CRDs to be installed in the cluster first
  # Install with: kubectl apply -f https://raw.githubusercontent.com/kubernetes-csi/external-snapshotter/release-8.2/client/config/crd/...
  enabled: false

  # VolumeSnapshotClass configuration
  volumeSnapshotClass:
    # Enable creation of VolumeSnapshotClass resources
    create: true
    # Deletion policy: Delete or Retain
    deletionPolicy: Delete

# Security context for controller pod
securityContext:
  runAsNonRoot: false
  runAsUser: 0
  fsGroup: 0

# Priority class names
priorityClassName:
  controller: system-cluster-critical
  node: system-node-critical

# Service account configuration
serviceAccount:
  # Annotations to add to the service accounts
  annotations: {}

# Namespace where the CSI driver will be deployed
namespace: kube-system

# RBAC configuration
rbac:
  # Create RBAC resources
  create: true

# OpenShift support
# Enable this when deploying on OpenShift to create the required
# SecurityContextConstraints for the node DaemonSet.
openshift:
  enabled: false

# Custom labels to add to all resources
customLabels: {}

# Custom annotations to add to all resources
customAnnotations: {}

# Grafana dashboard integration
grafana:
  dashboards:
    # Enable Grafana dashboard ConfigMap (auto-discovered by Grafana sidecar)
    enabled: false
    # Labels for Grafana sidecar discovery
    labels:
      grafana_dashboard: "1"
    # Additional annotations for the ConfigMap
    annotations: {}
